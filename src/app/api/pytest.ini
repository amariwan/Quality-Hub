[pytest]
addopts = -ra -vv --cov=src --cov-report=term-missing --cov-report=html
testpaths = tests
pythonpath = . src
asyncio_mode = auto
markers =
    - unit: Schnelle, isolierte Unit-Tests ohne externe Ressourcen,
    - integration: Tests über mehrere Schichten (DB / Services / Dependencies),
    - e2e: End-to-End Tests über die laufende FastAPI-App,
    - slow: "Langsame Tests (z.B. mit echter DB)",

filterwarnings =
    ignore::DeprecationWarning:pkg_resources.*
